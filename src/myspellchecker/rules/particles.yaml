# Myanmar Linguistic Particles - Version 1.0
# Myanmar particles organized by syntactic function with POS tags
#
# This file contains 92 linguistic particles with:
# - POS tags (P_SUBJ, P_OBJ, P_SENT, P_LOC, etc.)
# - Syntactic types (subject, object, locative, etc.)
# - Formality levels (colloquial, neutral, formal, polite, literary)
# - Confidence scores and usage examples
#
# Schema: https://myspellchecker.dev/schemas/particles/v1.0

version: "1.1.0"
category: "particles"
description: "Myanmar linguistic particles with POS tags and metadata"

metadata:
  created_date: "2025-12-30"
  last_updated: "2026-03-19"
  total_entries: 92

# ============================================================
# PARTICLE SYSTEM
# Organized by syntactic function with POS tags and metadata
# ============================================================
# ============================================================
particles:
  # Verb Particles - Markers that follow verbs
  verbs:
    tense:
      - particle: "ခဲ့"
        pos_tag: "P_PAST"
        type: "past_tense"
        meaning: "Past tense marker"
        formality: "neutral"
        examples:
          - correct: "သွားခဲ့တယ်"
            translation: "went"
          - correct: "စားခဲ့ပြီ"
            translation: "already ate"
        confidence: 0.98

      - particle: "မယ်"
        pos_tag: "P_FUT"
        type: "future_tense"
        meaning: "Future tense marker (colloquial)"
        formality: "colloquial"
        examples:
          - correct: "သွားမယ်"
            translation: "will go"
        confidence: 0.98

      - particle: "မည်"
        pos_tag: "P_FUT"
        type: "future_tense"
        meaning: "Future tense marker (formal)"
        formality: "formal"
        examples:
          - correct: "သွားမည်"
            translation: "will go (formal)"
        confidence: 0.95

      - particle: "လိမ့်မည်"
        pos_tag: "P_FUT"
        type: "probable_future"
        meaning: "Probable future (will likely)"
        formality: "formal"
        examples:
          - correct: "ရောက်လိမ့်မည်"
            translation: "will likely arrive"
        confidence: 0.90

      - particle: "လိမ့်မယ်"
        pos_tag: "P_FUT"
        type: "probable_future"
        meaning: "Probable future (will likely) - colloquial"
        formality: "colloquial"
        examples:
          - correct: "ရောက်လိမ့်မယ်"
            translation: "will likely arrive"
        confidence: 0.90

    aspect:
      - particle: "နေ"
        pos_tag: "P_PROG"
        type: "progressive"
        meaning: "Progressive aspect (currently doing)"
        formality: "neutral"
        examples:
          - correct: "စားနေတယ်"
            translation: "is eating"
          - correct: "သွားနေပြီ"
            translation: "is already going"
        confidence: 0.98

      - particle: "ပြီ"
        pos_tag: "P_PERF"
        type: "completion"
        meaning: "Completion marker (already/finished)"
        formality: "neutral"
        examples:
          - correct: "စားပြီ"
            translation: "finished eating"
        confidence: 0.98

      - particle: "ပြီး"
        pos_tag: "P_PERF"
        type: "completion_continuation"
        meaning: "Completion + continuation (after finishing)"
        formality: "neutral"
        examples:
          - correct: "စားပြီး သွားတယ်"
            translation: "after eating, went"
        confidence: 0.95

      - particle: "လျက်"
        pos_tag: "P_CONT"
        type: "continuous"
        meaning: "While doing (formal)"
        formality: "formal"
        examples:
          - correct: "စားလျက် စောင့်နေသည်"
            translation: "while eating, waiting"
        confidence: 0.85

    statement_endings:
      - particle: "တယ်"
        pos_tag: "P_SENT"
        type: "declarative"
        meaning: "Statement ending (colloquial)"
        formality: "colloquial"
        required_preceding: ["V", "ADJ", "P_POL", "P_NEG"]
        examples:
          - correct: "သွားတယ်"
            translation: "goes/went"
        confidence: 0.98

      - particle: "ပါတယ်"
