    - "ခေါင်းမာ"       # stubborn (lit. hard-headed)
    - "အသားမာ"         # tough (meat)
    - "ကျောက်မာ"      # gem, hard stone
    - "လက်မာ"          # skilled/heavy-handed
    - "သံမာ"           # hard metal/iron
    - "နှလုံးမာ"       # hard-hearted
    - "ကြေးမာ"         # hardened copper
    - "ခြေမာ"          # strong-footed
    - "သတ္တိမာ"        # brave/courageous
    - "အရိုးမာ"        # hard-boned
    - "ဉာဏ်မာ"        # sharp-minded
