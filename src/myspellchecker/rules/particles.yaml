# ============================================================
# PARTICLE MISUSE RULES
# Verb-frame-based particle correction rules.
# When a specific particle appears before a verb (within a
# context window), the particle is semantically wrong for the
# verb's argument structure.
#
# Each rule:
#   wrong_particle: the incorrect (but valid) particle
#   correct_particle: what it should be
#   verb_triggers: verbs/verb-phrases in the right context that
#                  disambiguate the particle choice
#   max_window: max tokens to scan ahead for verb triggers
#   description: human-readable explanation
#
# IMPORTANT: These rules fire only when a verb trigger is found
# in the right context. Particles without verb context are left
# alone. Keep verb_triggers highly specific to avoid FPs.
# ============================================================
particle_misuse_rules:
  # Pattern: NOUN+ကို VERB → should be NOUN+မှ VERB
  # "retrieve FROM X" not "retrieve TO X"
  - wrong_particle: "ကို"
    correct_particle: "မှ"
    verb_triggers:
      - "ပြန်လည်ရယူ"    # retrieve / recover
      - "ထုတ်ယူ"          # extract / take out
      - "ရယူ"             # obtain / take
      - "ထွက်ခွာ"         # depart from
      - "ထွက်လာ"          # come out from
      - "ရရှိ"            # receive from
    max_window: 5
    description: "Source/origin verbs require ablative (မှ), not object marker (ကို)"

  # Pattern: NOUN+ကို V+နေ → should be NOUN+မှာ V+နေ
  # "resting AT X" not "resting TO X"
  # Only when the verb is in progressive aspect (နေ = ongoing state)
  - wrong_particle: "ကို"
    correct_particle: "မှာ"
    verb_triggers:
      - "အနားယူနေ"       # resting (progressive)
      - "နေထိုင်နေ"      # residing (progressive)
      - "စောင့်ဆိုင်းနေ"  # waiting (progressive)
      - "အလုပ်လုပ်နေ"   # working (progressive)
      - "စောင့်နေ"        # waiting (progressive)
    max_window: 4
    description: "Stative/progressive verbs require locative (မှာ), not object marker (ကို)"

  # Pattern: NOUN+ကို စစ်ဆေးမှု/စစ်ဆေးခြင်း ပြုလုပ်
  # "conduct inspection IN X" not "inspect TO X"
  - wrong_particle: "ကို"
    correct_particle: "တွင်"
    verb_triggers:
      - "စစ်ဆေးမှု ပြုလုပ်"     # conduct inspection
      - "စစ်ဆေးခြင်း ပြုလုပ်"   # conduct inspection (formal)
      - "စုံစမ်းစစ်ဆေးမှု ပြုလုပ်"  # conduct investigation
    max_window: 5
    description: "Nominalized inspection verbs require locative (တွင်), not object (ကို)"

  # Pattern: NOUN+ကို မေးခွန်း မေး
  # "ask questions AT/IN a discussion" not "ask questions TO a discussion"
  - wrong_particle: "ကို"
    correct_particle: "မှာ"
    verb_triggers:
      - "မေးခွန်း မေး"    # ask questions
      - "မေးခွန်းမေး"     # ask questions (merged)
    max_window: 4
    description: "Asking questions happens AT a venue/event (မှာ), not TO it (ကို)"

  # Pattern: NOUN+မှာ လေ့ကျင့်ခန်း/အစီရင်ခံစာ VERB
  # "exercises FOR exam" not "exercises AT exam"
  - wrong_particle: "မှာ"
    correct_particle: "အတွက်"
    verb_triggers:
      - "လေ့ကျင့်ခန်း ပေး"    # give exercises
      - "လေ့ကျင့်ခန်းပေး"     # give exercises (merged)
      - "အစီရင်ခံစာ တင်သွင်း"  # submit report
      - "အစီရင်ခံစာတင်သွင်း"  # submit report (merged)
      - "ပြင်ဆင်"              # prepare for
      - "လေ့ကျင့်"             # practice for
      - "လေ့ကျင့်ခန်း လုပ်"    # do exercises
    max_window: 5
    description: "Purpose/benefactive verbs require အတွက် (for), not locative (မှာ)"

  # Pattern: SUBJECT+က ... NOUN+က ... ပေး
  # When two nouns are marked with က in the same clause and the verb
  # is ditransitive (give/provide), the second က is likely the
  # recipient and should be အား.
  # require_prior_marker: "က" means only fire when there's already
  # a က-marked noun earlier in the sentence.
  - wrong_particle: "က"
    correct_particle: "အား"
    verb_triggers:
      - "လမ်းညွှန်ချက် ပေး"    # give guidance
      - "လမ်းညွှန်ချက်ပေး"     # give guidance (merged)
      - "ညွှန်ကြားချက် ပေး"    # give instruction
      - "ညွှန်ကြားချက်ပေး"     # give instruction (merged)
    max_window: 4
    require_prior_marker: "က"
    description: "Recipient of ditransitive verbs requires အား (to), not subject marker (က)"

# ============================================================
# LOCATIVE EXEMPT PREFIXES
# Spatial postpositions that, when immediately preceding a
# locative particle (မှာ/တွင်), exempt the particle from
# misuse detection. "ထဲမှာ" = "inside at" is always valid.
# ============================================================
locative_exempt_prefixes:
  - "ထဲ"       # inside
  - "ပေါ်"     # on top
  - "အောက်"    # under
  - "ရှေ့"      # in front
  - "နောက်"    # behind
  - "ဘေး"      # beside
  - "အနား"     # near
  - "အထဲ"      # inside (formal)
  - "အပေါ်"    # on top (formal)
