  confidence: 0.85
  left_context_triggers:
    - "ပြီးတော်"     # completed + then
    - "ရောက်တော်"   # arrive + then
    - "တော်ပြီ"      # (wrong) should be: တော့ + completed
    - "ရတော်"        # get/obtain + then
    - "ပြောတော်"     # say + then
    - "လာတော်"       # come + then
    - "သွားတော်"     # go + then
    - "ဖြစ်တော်"     # happen/be + then
    - "ပေးတော်"      # give + then
    - "လုပ်တော်"     # do + then
    - "ထားတော်"      # put/keep + then

