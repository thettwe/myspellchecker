# Loan Word Correction Table - Version 1.0
#
# Tier 1: Unconditional corrections where the incorrect form is NEVER
# a valid Myanmar word. These can be applied without context checking.
#
# Data source: Inverted from loan_words.yaml variants + benchmark
# loan word error analysis (75 instances).
#
# Error patterns:
#   - final_consonant: Final k/t confusion (internet, project, budget)
#   - medial_confusion: Ya-pin/Ya-yit medial swap (computer)
#   - spurious_visarga: Extra visarga added (coffee, license, doctor)
#   - missing_visarga: Missing visarga (email)
#   - vowel_length: Short/long vowel confusion (digital, video)
#   - syllable_reorder: Syllable order swapped (software)
#   - consonant_voicing: Voiced/voiceless confusion (browser)
#   - broken_stack: Pali stacking broken into virama+consonant (Dhamma, Buddha)
#   - dropped_stack: Pali stacking dropped entirely (science, president)
#   - missing_consonant: Missing consonant in transliteration (program)
#   - missing_asat: Missing asat in transliteration (manager)
#   - vowel_mapping: Wrong vowel mapping from source language (hotel, democracy)
#
# FPR exclusions (moved to Tier 2 or confusable_pairs):
#   - "phone" variant removed
#   - "bat/bus" variant removed
#   - "music" variant removed
#
# Schema: https://myspellchecker.dev/schemas/loan-word-corrections/v1.0

