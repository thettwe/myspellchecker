pairs:
- word: ပျံ
  correction: ပြန်
  confusion_type: medial_nasal_compound
  bidirectional: true
  notes: fly vs return — ျ↔ြ medial swap + ံ↔န် nasal swap. Very common typo in 'go
    home' context.
- word: အဖော်
  correction: အဖွဲ့
  confusion_type: vowel_compound
  bidirectional: true
  notes: companion vs group/team — common in academic/work context.
- word: ပေး
  correction: ထား
  confusion_type: verb_frame
  bidirectional: true
  notes: give vs place/put — 'phone on table ထား' not 'phone on table ပေး'.
- word: တင်
  correction: စီး
  confusion_type: verb_frame
  bidirectional: true
  notes: load vs ride — 'bike on road စီးသွား' not 'bike on road တင်သွား'.
- word: သွား
  correction: နေ
  confusion_type: verb_frame
  bidirectional: true
  notes: go vs stay — 'at home နေ' not 'at home သွား'.
- word: စာစား
  correction: စာဖတ်
  confusion_type: compound_verb
  bidirectional: true
  notes: eat text vs read — same object 'စာ' with wrong verb.
- word: ကြည့်
  correction: နားထောင်
  confusion_type: verb_frame
  bidirectional: true
  notes: watch vs listen — 'news နားထောင်' not 'news ကြည့်'.
- word: သောက်
  correction: နှုတ်ဆက်
  confusion_type: verb_frame
  bidirectional: true
  notes: drink vs greet — 'teacher နှုတ်ဆက်' not 'teacher သောက်'.
- word: အိမ်ပျံ
  correction: အိမ်ပြန်
  confusion_type: compound_word
  bidirectional: true
  notes: home-fly vs home-return — compound containing ပျံ/ပြန် confusion.
- word: တင်သွား
  correction: စီးသွား
  confusion_type: compound_verb
  bidirectional: true
  notes: load-go vs ride-go — compound verb confusion with shared auxiliary.
- word: ကြည့်
  correction: မြင်
  confusion_type: near_synonym
  bidirectional: true
  notes: 'look/watch (deliberate visual attention) vs see/perceive (involuntary perception).
    ကြည့် selects for intentional objects: TV, movie, scenery. မြင် selects for stimuli:
    effects, changes, scenes noticed passively. E.g., ''ရလဒ်ကို မြင်နိုင်'' (can see
    the result) not ''ရလဒ်ကို ကြည့်နိုင်''.

    '
- word: နားထောင်
  correction: ကြား
  confusion_type: near_synonym
  bidirectional: true
  notes: 'listen (deliberate auditory attention) vs hear (involuntary perception).
    နားထောင် selects for intentional objects: music, lecture, radio. ကြား selects
    for stimuli: news, sounds, rumors perceived passively. E.g., ''သတင်းကြားရတယ်''
    (heard the news) not ''သတင်းနားထောင်ရတယ်''.

    '
- word: ရှာ
  correction: တွေ့
  confusion_type: near_synonym
  bidirectional: true
  notes: 'search/look for (deliberate process) vs find/discover (result). ရှာ implies
    ongoing effort; တွေ့ implies the result of finding. E.g., ''အဖြေတွေ့ပြီ'' (found
    the answer) not ''အဖြေရှာပြီ''.

    '
- word: ပြော
  correction: ဖော်ပြ
  confusion_type: near_synonym
  bidirectional: true
  notes: 'say/tell (casual speech) vs express/present (formal reporting). ပြော is
    for direct speech/conversation; ဖော်ပြ is for formal presentation of data, findings,
    opinions. E.g., ''အစီရင်ခံစာတွင် ဖော်ပြခဲ့သည်'' (presented in the report) not
    ''ပြောခဲ့သည်''.

    '
- word: ပြော
  correction: ဆို
  confusion_type: near_synonym
  bidirectional: true
  notes: 'say/tell (casual) vs say/recite (literary/formal). ပြော is conversational;
    ဆို is used in formal quotation, literature, proverbs, and religious contexts.
    E.g., ''စကားပုံတွင် ဆိုထားသည်'' (as the proverb says) not ''ပြောထားသည်''.

    '
- word: သိ
  correction: နားလည်
  confusion_type: near_synonym
  bidirectional: true
  notes: 'know (a fact/information) vs understand (comprehend deeply). သိ is for factual
    awareness; နားလည် is for comprehension. E.g., ''အကြောင်းအရာကို နားလည်'' (understand
    the subject matter) not ''အကြောင်းအရာကို သိ'' when deep comprehension is meant.

    '
- word: ဆိုက်
  correction: ရောက်
  confusion_type: near_synonym
  bidirectional: true
  notes: 'arrive (for storms, vehicles, boats — manner-specific) vs arrive (general).
    ဆိုက် is restricted to natural forces (storms arriving), vehicles (boats docking),
    and metaphorical impact. ရောက် is the general verb for arriving at a destination.
    E.g., ''ညစာချိန် ရောက်တာနဲ့'' (when dinner time arrived) not ''ဆိုက်တာနဲ့''.

    '
- word: ဆိုက်
  correction: ရောက်ရှိ
  confusion_type: near_synonym
  bidirectional: false
  notes: 'arrive (manner-specific) vs arrive (formal/general). ရောက်ရှိ is the formal
    compound form of ရောက်. Used in news, official reports. One-directional: ရောက်ရှိ→ဆိုက်
    replacement is rare in practice.

    '
- word: ယူ
  correction: ရ
  confusion_type: near_synonym
  bidirectional: true
  notes: 'take (deliberate, volitional) vs get/receive (non-volitional outcome). ယူ
    implies the agent intentionally takes something; ရ implies obtaining as a result
    or receiving. E.g., ''ဆုရခဲ့တယ်'' (received a prize) not ''ဆုယူခဲ့တယ်'' when the
    receipt was not a deliberate taking.

    '
- word: သင်
  correction: လေ့လာ
  confusion_type: near_synonym
  bidirectional: true
  notes: 'teach vs study/learn. သင် primarily means ''teach'' (teacher as agent) but
    is sometimes confused with ''learn'' (student as agent). လေ့လာ specifically means
    ''study/investigate/learn''. E.g., ''ကျောင်းသားများ လေ့လာ'' (students study) not
    ''ကျောင်းသားများ သင်''.

    '
- word: တောင်း
  correction: မေး
  confusion_type: near_synonym
  bidirectional: true
  notes: 'request/ask for (something tangible) vs ask (a question). တောင်း is for
    requesting objects, help, permission; မေး is for asking questions, inquiring.
    E.g., ''မေးခွန်းမေး'' (ask a question) not ''မေးခွန်းတောင်း''.

    '
- word: လာ
  correction: ရောက်
  confusion_type: near_synonym
  bidirectional: true
  notes: 'come (movement toward speaker) vs arrive (reaching destination). လာ emphasizes
    direction of travel; ရောက် emphasizes completion of journey. E.g., ''ရန်ကုန်ရောက်ပြီ''
    (arrived in Yangon) vs ''ရန်ကုန်လာပြီ'' (came to Yangon). Distinction matters
    in formal contexts where arrival at destination is the focus.

    '
