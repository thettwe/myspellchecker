# Curated Confusable Word Pairs - Version 1.1
#
# Known commonly-confused Myanmar word pairs that bypass the standard
# threshold stacking in ConfusableSemanticStrategy.
#
# These pairs represent real-word confusion errors where:
#   1. Both the incorrect and correct forms are valid dictionary words
#   2. The pair cannot be generated by phonetic/visual variant rules
#      (too many edits, or the transformation is not a standard
#       phonetic swap like aspiration/medial/nasal)
#   3. The MLM model can reliably distinguish them in context
#
# Two threshold tiers:
#   - General curated pairs: curated_logit_diff_threshold (default: 2.0)
#   - Near-synonym pairs:    near_synonym_logit_diff_threshold (default: 3.0)
#     Near-synonyms need a higher threshold because both words share
#     semantic overlap and are often high-frequency, so MLM must show
#     stronger evidence to avoid false positives.
#
# Format:
#   word: the commonly written (incorrect in context) form
#   correction: the contextually correct form
#   confusion_type: what kind of confusion this represents
#     - "near_synonym" routes to the near-synonym threshold tier
#     - all other values use the general curated threshold
#   bidirectional: whether the reverse pair should also be registered
#   notes: optional annotation

version: "1.1.0"
category: "confusable_pairs"
description: "Curated confusable word pairs for MLM-based real-word error detection"

metadata:
  created_date: "2026-03-18"
  last_updated: "2026-03-18"
  total_entries: 25
  source: "Curated near-synonym and phonetic confusion patterns"

# Curated pairs grouped by confusion type.
# Each entry generates variant candidates injected into the
# ConfusableSemanticStrategy alongside the phonetic variants.

pairs:
  # ══════════════════════════════════════════════════════════════════
  # GENERAL CURATED PAIRS (threshold: curated_logit_diff_threshold)
  # ══════════════════════════════════════════════════════════════════

  # ── Medial + nasal compound confusion ──
  # These involve ျ↔ြ medial swap combined with nasal ending change,
  # which is too many edits for the standard variant generator.

  - word: "ပျံ"
    correction: "ပြန်"
    confusion_type: medial_nasal_compound
    bidirectional: true
    notes: "fly vs return — ျ↔ြ medial swap + ံ↔န် nasal swap. Very common typo in 'go home' context."

  # ── wa-hswe / vowel compound confusion ──
  # The structural difference (ော↔ွဲ) is too large for variant generation.

  - word: "အဖော်"
    correction: "အဖွဲ့"
    confusion_type: vowel_compound
    bidirectional: true
    notes: "companion vs group/team — common in academic/work context."

  # ── Verb confusion pairs ──
  # These are single-syllable verb confusions where both verbs are common
  # but semantically incompatible in certain frames. The MLM model can
  # reliably distinguish them because the surrounding nouns strongly
  # select for one verb over the other.

  - word: "ပေး"
    correction: "ထား"
    confusion_type: verb_frame
    bidirectional: true
    notes: "give vs place/put — 'phone on table ထား' not 'phone on table ပေး'."

  - word: "တင်"
    correction: "စီး"
    confusion_type: verb_frame
    bidirectional: true
    notes: "load vs ride — 'bike on road စီးသွား' not 'bike on road တင်သွား'."

  - word: "သွား"
    correction: "နေ"
    confusion_type: verb_frame
    bidirectional: true
    notes: "go vs stay — 'at home နေ' not 'at home သွား'."

  # ── Compound verb confusion ──
  # Multi-syllable compound verbs where one morpheme is wrong.

  - word: "စာစား"
    correction: "စာဖတ်"
    confusion_type: compound_verb
    bidirectional: true
    notes: "eat text vs read — same object 'စာ' with wrong verb."

  - word: "ကြည့်"
    correction: "နားထောင်"
    confusion_type: verb_frame
    bidirectional: true
    notes: "watch vs listen — 'news နားထောင်' not 'news ကြည့်'."

  - word: "သောက်"
    correction: "နှုတ်ဆက်"
    confusion_type: verb_frame
    bidirectional: true
    notes: "drink vs greet — 'teacher နှုတ်ဆက်' not 'teacher သောက်'."

  # ── Compound word confusion (within larger words) ──
  # These appear as parts of compound words and need word-level matching.

  - word: "အိမ်ပျံ"
    correction: "အိမ်ပြန်"
    confusion_type: compound_word
    bidirectional: true
    notes: "home-fly vs home-return — compound containing ပျံ/ပြန် confusion."

  - word: "တင်သွား"
    correction: "စီးသွား"
    confusion_type: compound_verb
    bidirectional: true
    notes: "load-go vs ride-go — compound verb confusion with shared auxiliary."

  # ══════════════════════════════════════════════════════════════════
  # NEAR-SYNONYM PAIRS (threshold: near_synonym_logit_diff_threshold)
  # ══════════════════════════════════════════════════════════════════
  #
  # Near-synonym confusions where two semantically similar words are
  # used interchangeably but one is contextually wrong. Both words
  # are typically valid and high-frequency, so stronger MLM evidence
  # is required (default threshold 3.0 vs 2.0 for general curated).
  #
  # Linguistic pattern: deliberate-action vs involuntary-perception,
  # casual vs formal register, process vs result, etc.

  # ── Perception verbs: deliberate vs involuntary ──
  # Strong selectional restrictions: deliberate verbs take volitional
  # agents with intentional objects; perception verbs take experiencer
  # subjects with stimulus objects.

  - word: "ကြည့်"
    correction: "မြင်"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      look/watch (deliberate visual attention) vs see/perceive (involuntary
      perception). ကြည့် selects for intentional objects: TV, movie, scenery.
      မြင် selects for stimuli: effects, changes, scenes noticed passively.
      E.g., 'ရလဒ်ကို မြင်နိုင်' (can see the result) not 'ရလဒ်ကို ကြည့်နိုင်'.

  - word: "နားထောင်"
    correction: "ကြား"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      listen (deliberate auditory attention) vs hear (involuntary perception).
      နားထောင် selects for intentional objects: music, lecture, radio.
      ကြား selects for stimuli: news, sounds, rumors perceived passively.
      E.g., 'သတင်းကြားရတယ်' (heard the news) not 'သတင်းနားထောင်ရတယ်'.

  - word: "ရှာ"
    correction: "တွေ့"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      search/look for (deliberate process) vs find/discover (result).
      ရှာ implies ongoing effort; တွေ့ implies the result of finding.
      E.g., 'အဖြေတွေ့ပြီ' (found the answer) not 'အဖြေရှာပြီ'.

  # ── Communication verbs: casual vs formal ──
  # Register-sensitive pairs where the verb choice depends on the
  # formality of the context and the type of communication act.

  - word: "ပြော"
    correction: "ဖော်ပြ"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      say/tell (casual speech) vs express/present (formal reporting).
      ပြော is for direct speech/conversation; ဖော်ပြ is for formal
      presentation of data, findings, opinions. E.g., 'အစီရင်ခံစာတွင်
      ဖော်ပြခဲ့သည်' (presented in the report) not 'ပြောခဲ့သည်'.

  - word: "ပြော"
    correction: "ဆို"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      say/tell (casual) vs say/recite (literary/formal). ပြော is
      conversational; ဆို is used in formal quotation, literature,
      proverbs, and religious contexts. E.g., 'စကားပုံတွင် ဆိုထားသည်'
      (as the proverb says) not 'ပြောထားသည်'.

  # ── Cognition verbs: factual knowledge vs deep understanding ──

  - word: "သိ"
    correction: "နားလည်"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      know (a fact/information) vs understand (comprehend deeply).
      သိ is for factual awareness; နားလည် is for comprehension.
      E.g., 'အကြောင်းအရာကို နားလည်' (understand the subject matter)
      not 'အကြောင်းအရာကို သိ' when deep comprehension is meant.

  # ── Arrival verbs: manner-specific vs general ──

  - word: "ဆိုက်"
    correction: "ရောက်"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      arrive (for storms, vehicles, boats — manner-specific) vs arrive
      (general). ဆိုက် is restricted to natural forces (storms arriving),
      vehicles (boats docking), and metaphorical impact. ရောက် is the
      general verb for arriving at a destination.
      E.g., 'ညစာချိန် ရောက်တာနဲ့' (when dinner time arrived) not 'ဆိုက်တာနဲ့'.

  - word: "ဆိုက်"
    correction: "ရောက်ရှိ"
    confusion_type: near_synonym
    bidirectional: false
    notes: >
      arrive (manner-specific) vs arrive (formal/general). ရောက်ရှိ is the
      formal compound form of ရောက်. Used in news, official reports.
      One-directional: ရောက်ရှိ→ဆိုက် replacement is rare in practice.

  # ── Acquisition verbs: volitional vs non-volitional ──

  - word: "ယူ"
    correction: "ရ"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      take (deliberate, volitional) vs get/receive (non-volitional outcome).
      ယူ implies the agent intentionally takes something; ရ implies obtaining
      as a result or receiving. E.g., 'ဆုရခဲ့တယ်' (received a prize) not
      'ဆုယူခဲ့တယ်' when the receipt was not a deliberate taking.

  # ── Teaching/learning verbs ──

  - word: "သင်"
    correction: "လေ့လာ"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      teach vs study/learn. သင် primarily means 'teach' (teacher as agent)
      but is sometimes confused with 'learn' (student as agent). လေ့လာ
      specifically means 'study/investigate/learn'. E.g., 'ကျောင်းသားများ
      လေ့လာ' (students study) not 'ကျောင်းသားများ သင်'.

  # ── Request verbs ──

  - word: "တောင်း"
    correction: "မေး"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      request/ask for (something tangible) vs ask (a question). တောင်း is
      for requesting objects, help, permission; မေး is for asking questions,
      inquiring. E.g., 'မေးခွန်းမေး' (ask a question) not 'မေးခွန်းတောင်း'.

  # ── Movement verbs ──

  - word: "လာ"
    correction: "ရောက်"
    confusion_type: near_synonym
    bidirectional: true
    notes: >
      come (movement toward speaker) vs arrive (reaching destination).
      လာ emphasizes direction of travel; ရောက် emphasizes completion of
      journey. E.g., 'ရန်ကုန်ရောက်ပြီ' (arrived in Yangon) vs
      'ရန်ကုန်လာပြီ' (came to Yangon). Distinction matters in formal
      contexts where arrival at destination is the focus.

# ══════════════════════════════════════════════════════════════════
# EXEMPT PAIRS
# Word pairs that should NOT be flagged as confusable errors.
# These are valid word pairs where the variant generation produces
# a plausible but incorrect suggestion.
# ══════════════════════════════════════════════════════════════════

exempt_pairs:
  # ── Loanword aspiration exemptions ──
  - word: "ဖေး"
    variant: "ဘေး"
    reason: "Loanword cafe (ကဖေး) -- aspiration swap produces valid but different word"
  - word: "ဘေး"
    variant: "ဖေး"
    reason: "Reverse direction of above"

  # ── Aspiration swap: ထား (place/put) ↔ တား (block/prevent) ──
  # Batch ONNX inference introduced 3 FPs on ထား being confused with တား.
  # Both are common verbs occupying similar syntactic slots (verb-final),
  # so the MLM frequency bias dominates over contextual signal.
  - word: "ထား"
    variant: "တား"
    reason: "Aspiration swap ထ↔တ -- both common verbs in similar syntactic slots"
  - word: "တား"
    variant: "ထား"
    reason: "Reverse direction of above"

# ══════════════════════════════════════════════════════════════════
# EXEMPT SUFFIX PAIRS
# Suffix pairs where the ending should not trigger confusable
# detection. The variant generator produces these via tone mark
# manipulation, but the distinction is purely syntactic and the
# MLM cannot reliably distinguish them.
# ══════════════════════════════════════════════════════════════════

exempt_suffix_pairs:
  - suffix_a: "သည်"
    suffix_b: "သည့်"
    reason: "Syntactic distinction (sentence-final declarative vs attributive/relative clause)"
  - suffix_a: "သည့်"
    suffix_b: "သည်"
    reason: "Reverse direction of above"
