    correct_word: "ထမ်းဆောင်"
    context_words: ["တာဝန်", "ကိုယ်ကျိုး"]
    direction: "right"
    window: 3
    notes: "Bear responsibility uses ထမ်းဆောင်, not just ထမ်း"

  # --- see vs meet (person context) ---
  - wrong_word: "မြင်"
    correct_word: "တွေ့"
    context_words: ["ဆရာ", "မိဘ", "ကြိုဆို"]
    direction: "right"
    window: 3
    notes: "Meet a person (တွေ့), not see them (မြင်)"

  # --- push vs promote (interest/progress context) ---
  - wrong_word: "တွန်း"
    correct_word: "မြှင့်တင်"
    context_words: ["ဖွံ့ဖြိုး", "တိုးတက်"]
    direction: "right"
    window: 3
    notes: "Promote development (မြှင့်တင်), not push it (တွန်း)"

  # --- pull vs attract (attention context) ---
  - wrong_word: "ဆွဲ"
    correct_word: "ဆွဲဆောင်"
    context_words: ["စိတ်ဝင်စား", "အာရုံ"]
    direction: "right"
    window: 3
    notes: "Attract attention (ဆွဲဆောင်), not pull it (ဆွဲ)"

  # --- hard vs difficult (exam context) ---
