# Loan Word Transliteration Variants - Version 1.0
#
# Myanmar text contains many loan words from English, Pali, Sanskrit,
# and other languages. These words often have multiple valid transliteration
# variants, and the spell checker needs dedicated rules to handle them.
#
# This file provides:
#   1. Standard form and known variant spellings for common loan words
#   2. Source language and original word for each entry
#   3. Domain classification for context-aware checking
#   4. Transliteration pattern rules for systematic variant generation
#
# Usage:
#   - Variants listed here should NOT be flagged as misspellings
#   - The "standard" form is the preferred/recommended spelling
#   - When a variant is detected, suggest the standard form as preferred
#   - Domain tags enable context-sensitive strictness
#
# Schema: https://myspellchecker.dev/schemas/loan-words/v1.0

version: "1.0.0"
category: "loan_words"
description: "Loan word transliteration variants for Myanmar spell checking"

