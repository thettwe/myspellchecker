# ============================================================
# TRANSLITERATION PATTERN RULES
# ============================================================
# Common phoneme-mapping confusion patterns that apply systematically
# across loan words. These describe WHY certain transliteration errors
# occur and can be used for systematic variant generation.
transliteration_patterns:
  english_to_myanmar:
    # ── Consonant mappings ──
    - source_phoneme: "/s/"
      correct: ["စ", "ဆ"]
      common_error: ["သ"]
      note: "English 's' maps to စ (voiceless) or ဆ (aspirated), NOT သ (dental fricative)"

    - source_phoneme: "/r/"
      correct: ["ရ"]
      common_error: ["လ"]
      note: "English 'r' maps to ရ (liquid r), sometimes confused with လ (lateral l)"

    - source_phoneme: "/f/"
      correct: ["ဖ"]
      common_error: ["ပ"]
      note: "English 'f' maps to ဖ (aspirated labial), no native /f/ so confused with ပ"

    - source_phoneme: "/v/"
      correct: ["ဗ"]
      common_error: ["ဘ"]
      note: "English 'v' maps to ဗ (voiced labial), confused with ဘ (aspirated)"

    - source_phoneme: "/z/"
      correct: ["ဇ"]
      common_error: ["စ", "ဆ"]
      note: "English 'z' maps to ဇ (voiced palatal), confused with voiceless counterparts"

    - source_phoneme: "/dʒ/"
      correct: ["ဂျ"]
      common_error: ["ချ", "ဂ"]
      note: "English 'j/g(e)' maps to ဂျ (consonant+medial), common composition error"

    - source_phoneme: "/ʃ/"
      correct: ["ရှ"]
      common_error: ["ရ", "ဆ"]
      note: "English 'sh' maps to ရှ (r+ha-htoe), sometimes simplified to ရ or ဆ"

    - source_phoneme: "/tʃ/"
      correct: ["ချ"]
      common_error: ["ခ", "ဂျ"]
      note: "English 'ch' maps to ချ (kha+medial ya), confused with plain ခ or ဂျ"

    - source_phoneme: "/θ/"
      correct: ["သ"]
      common_error: ["စ", "ဆ"]
      note: "English 'th' (voiceless) maps to သ (dental), confused with palatal sibilants"

    - source_phoneme: "/k/"
      correct: ["က"]
      common_error: ["ခ"]
      note: "English 'k/c' maps to က (voiceless velar), confused with ခ (aspirated)"

    # ── Vowel mappings ──
    - source_phoneme: "/eɪ/"
      correct: ["ေး"]
      common_error: ["ေ", "ဲ"]
      note: "English long 'a' (as in 'cake') → ေး, shortened to ေ or confused with ဲ"

    - source_phoneme: "/iː/"
      correct: ["ီ"]
      common_error: ["ိ"]
      note: "English long 'ee' → ီ (long i), confused with ိ (short i)"

    - source_phoneme: "/ɔː/"
      correct: ["ော"]
      common_error: ["ေါ", "ော်"]
      note: "English 'aw/or' → ော, common reordering or asat confusion"

    # ── Final consonant mappings ──
    - source_phoneme: "final /t/"
      correct: ["တ်"]
      common_error: ["က်", "ဒ်"]
      note: "English final 't' maps to တ် (ta+asat), confused with other finals"

    - source_phoneme: "final /d/"
      correct: ["ဒ်"]
      common_error: ["တ်"]
      note: "English final 'd' maps to ဒ်, often devoiced to တ်"

    - source_phoneme: "final /n/"
      correct: ["န်"]
      common_error: ["င်"]
      note: "English final 'n' → န်, confused with င် (velar nasal)"

    - source_phoneme: "final /ŋ/"
      correct: ["င်"]
      common_error: ["န်"]
      note: "English final 'ng' → င် (velar nasal), confused with န် (alveolar)"
