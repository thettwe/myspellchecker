# ============================================================
# COMPOUND PATTERNS (productive morphological rules)
# ============================================================
# These are generalizable rules, not exhaustive word lists.
# The strategy uses these to catch compounds NOT in the explicit list.

compound_patterns:
  # အ-prefix nominalizations (verb -> noun): must stay joined
  - pattern_id: "a_prefix_nominalization"
    prefix: "အ"
    description: "အ-prefix creates nouns from verbs; must stay joined"
    examples: ["အလုပ်", "အစား", "အသုံး", "အပြော", "အရေး", "အကူ", "အမှု"]

  # Reduplication compounds: reduplicated words are single units
  - pattern_id: "reduplication"
    description: "Reduplicated words must stay joined"
    examples: ["ဖြည်းဖြည်း", "ချောချော", "လှလှ", "မြန်မြန်", "ကောင်းကောင်း"]

# ============================================================
# FALSE COMPOUNDS (should NOT be flagged as broken compounds)
# ============================================================
# Word sequences that frequency heuristics might wrongly flag as
# broken compounds. These are intentionally separate words.

false_compounds:
  # Verb + sentence-final particle (never compounds)
  - parts: ["သွား", "တယ်"]
    reason: "verb + SFP"

  - parts: ["လာ", "တယ်"]
    reason: "verb + SFP"

  - parts: ["စား", "တယ်"]
    reason: "verb + SFP"

  - parts: ["လုပ်", "တယ်"]
    reason: "verb + SFP"

  - parts: ["ရေး", "တယ်"]
    reason: "verb + SFP"

  - parts: ["ပြော", "တယ်"]
    reason: "verb + SFP"

  - parts: ["သိ", "တယ်"]
    reason: "verb + SFP"

  - parts: ["ကြည့်", "တယ်"]
    reason: "verb + SFP"

  # Verb + sequential particle (not compounds)
  - parts: ["စား", "ပြီး"]
    reason: "verb + sequential particle"

  - parts: ["သွား", "ပြီး"]
    reason: "verb + sequential particle"

  - parts: ["လုပ်", "ပြီး"]
    reason: "verb + sequential particle"

  - parts: ["ရေး", "ပြီး"]
    reason: "verb + sequential particle"

  # Verb + completed aspect
  - parts: ["သွား", "ခဲ့"]
    reason: "verb + completed aspect marker"

  - parts: ["လာ", "ခဲ့"]
    reason: "verb + completed aspect marker"

  - parts: ["စား", "ခဲ့"]
    reason: "verb + completed aspect marker"

  - parts: ["လုပ်", "ခဲ့"]
    reason: "verb + completed aspect marker"

  # Verb + future/irrealis
  - parts: ["သွား", "မယ်"]
    reason: "verb + future particle"

  - parts: ["လာ", "မယ်"]
    reason: "verb + future particle"

  - parts: ["စား", "မယ်"]
    reason: "verb + future particle"

  - parts: ["လုပ်", "မယ်"]
    reason: "verb + future particle"

  # Noun + postposition (separate words)
  - parts: ["အိမ်", "မှာ"]
    reason: "noun + locative postposition"

  - parts: ["ကျောင်း", "မှာ"]
    reason: "noun + locative postposition"

  - parts: ["ဈေး", "မှာ"]
    reason: "noun + locative postposition"

  - parts: ["အိမ်", "ကို"]
    reason: "noun + accusative/directional postposition"

  - parts: ["ကျောင်း", "ကို"]
    reason: "noun + accusative/directional postposition"

  # Verb + negation contexts
  - parts: ["မ", "သွား"]
    reason: "negation prefix + verb (written separately)"

  - parts: ["မ", "လာ"]
    reason: "negation prefix + verb"

  - parts: ["မ", "စား"]
    reason: "negation prefix + verb"

  - parts: ["မ", "လုပ်"]
    reason: "negation prefix + verb"
