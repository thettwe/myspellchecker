compound_patterns:
- pattern_id: a_prefix_nominalization
  prefix: အ
  description: အ-prefix creates nouns from verbs; must stay joined
  examples:
  - အလုပ်
  - အစား
  - အသုံး
  - အပြော
  - အရေး
  - အကူ
  - အမှု
- pattern_id: reduplication
  description: Reduplicated words must stay joined
  examples:
  - ဖြည်းဖြည်း
  - ချောချော
  - လှလှ
  - မြန်မြန်
  - ကောင်းကောင်း
