# Myanmar Compound Morphology Rules - Version 1.0
# Morphological validation for compound word boundaries.
#
# Three sections:
#   1. mandatory_compounds — words that MUST be written as single compounds
#      (splitting them is an error)
#   2. compound_patterns — productive morphological rules that generate
#      mandatory compounds (e.g., "အ + verb" nominalizations)
#   3. false_compounds — word sequences that look like broken compounds but
#      are intentionally separate (verb + particle, etc.)
#
# Used by BrokenCompoundStrategy to override frequency heuristics with
# curated morphological knowledge.

version: "1.0.0"
category: "compound_morphology"
description: "Compound word morphological validation rules"

metadata:
  created_date: "2026-03-31"

