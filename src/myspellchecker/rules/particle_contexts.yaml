# Myanmar Particle Context Validation Rules - Version 1.0
# Validates particle choice given verb/noun context.
#
# Common misuse patterns where particles are confused because
# they sound similar, overlap in meaning, or differ by register.
#
# Schema: https://myspellchecker.dev/schemas/particle_contexts/v1.0

version: "1.0.0"
category: "particle_contexts"
description: "Verb-particle and noun-particle context validation rules"

metadata:
  created_date: "2026-03-31"
  total_entries: 53

# ============================================================
# PARTICLE CONFUSION PAIRS
# Each entry describes two particles that are commonly swapped,
# the syntactic context where the error occurs, and examples.
# ============================================================
particle_confusions:
  # ---------- Case marker confusions ----------

  # Subject marker က vs object marker ကို
  - particle: "ကို"
    confused_with: "က"
    context: "after_object_noun"
    description: "Object nouns take ကို, not subject marker က"
    confidence: 0.75
    examples:
      correct: ["စာအုပ်ကို ဖတ်တယ်", "ထမင်းကို စားတယ်"]
      incorrect: ["စာအုပ်က ဖတ်တယ်", "ထမင်းက စားတယ်"]

  # Object marker ကို vs subject marker က (reverse)
  - particle: "က"
    confused_with: "ကို"
    context: "after_subject_noun"
    description: "Subject/agent nouns take က, not object marker ကို"
    confidence: 0.70
    examples:
      correct: ["ကျောင်းသားက လာတယ်", "သူက ပြောတယ်"]
      incorrect: ["ကျောင်းသားကို လာတယ်"]

  # ---------- Location / direction confusions ----------

  # Static location မှာ vs directional ကို
  - particle: "မှာ"
    confused_with: "ကို"
    context: "static_location"
    description: "Static location takes မှာ, not directional ကို"
    confidence: 0.70
    examples:
      correct: ["ကျောင်းမှာ ရှိတယ်", "အိမ်မှာ နေတယ်"]
      incorrect: ["ကျောင်းကို ရှိတယ်"]

  # Directional ကို vs static location မှာ
  - particle: "ကို"
    confused_with: "မှာ"
    context: "directional_motion"
    description: "Motion verbs take directional ကို, not static မှာ"
    confidence: 0.70
    examples:
      correct: ["ကျောင်းကို သွားတယ်", "ဈေးကို သွားမယ်"]
      incorrect: ["ကျောင်းမှာ သွားတယ်"]

  # Source marker မှ vs static location မှာ
  - particle: "မှ"
    confused_with: "မှာ"
    context: "source_origin"
    description: "Source/origin takes မှ, not locative မှာ"
    confidence: 0.70
    examples:
      correct: ["ကျောင်းမှ ပြန်လာတယ်", "ရန်ကုန်မှ ထွက်တယ်"]
      incorrect: ["ကျောင်းမှာ ပြန်လာတယ်"]

  # Formal locative တွင် vs colloquial မှာ
  - particle: "တွင်"
    confused_with: "မှာ"
    context: "formal_location"
    description: "Formal locative uses တွင်; colloquial uses မှာ"
    confidence: 0.60
    examples:
      correct: ["ကျောင်းတွင် ရှိသည်"]
      incorrect: ["ကျောင်းမှာ ရှိသည်"]

  # ---------- Completion / sequence confusions ----------

  # Sequential ပြီး vs completed ပြီ
  - particle: "ပြီး"
    confused_with: "ပြီ"
    context: "sequential_action"
    description: "Sequential actions (after doing X, do Y) use ပြီး not ပြီ"
    confidence: 0.70
    examples:
      correct: ["စားပြီး သွားတယ်", "ရေချိုးပြီး အိပ်တယ်"]
      incorrect: ["စားပြီ သွားတယ်"]

  # Completed ပြီ vs sequential ပြီး
  - particle: "ပြီ"
    confused_with: "ပြီး"
    context: "sentence_final_completion"
    description: "Sentence-final completion uses ပြီ not ပြီး"
    confidence: 0.70
    examples:
      correct: ["စားပြီ", "ရောက်ပြီ"]
      incorrect: ["စားပြီး။"]

  # ---------- Reason / cause confusions ----------

  # Colloquial reason လို့ vs formal ကြောင့်
  - particle: "လို့"
    confused_with: "ကြောင့်"
    context: "reason_clause"
    description: "Colloquial reason clause uses လို့, formal uses ကြောင့်"
    confidence: 0.65
    examples:
      correct: ["မိုးရွာလို့ မသွားဘူး"]
      incorrect: ["မိုးရွာကြောင့် မသွားဘူး"]

  # Formal reason ကြောင့် vs colloquial လို့
  - particle: "ကြောင့်"
    confused_with: "လို့"
    context: "formal_reason_clause"
    description: "Formal reason clause uses ကြောင့်, colloquial uses လို့"
    confidence: 0.65
    examples:
      correct: ["မိုးရွာသောကြောင့် မသွားပါ"]
      incorrect: ["မိုးရွာလို့ မသွားပါ"]

  # ---------- Instrumentive / comitative confusions ----------

  # Instrumental နဲ့ (with) vs comitative နှင့် (formal with)
  - particle: "နဲ့"
    confused_with: "နှင့်"
    context: "colloquial_instrumental"
    description: "Colloquial instrumental uses နဲ့, formal uses နှင့်"
    confidence: 0.60
    examples:
      correct: ["ခဲတံနဲ့ ရေးတယ်", "သူနဲ့ သွားတယ်"]
      incorrect: []

  # ---------- Possessive confusions ----------

  # Colloquial possessive ရဲ့ vs formal possessive ၏
  - particle: "ရဲ့"
    confused_with: "၏"
    context: "colloquial_possessive"
    description: "Colloquial possessive uses ရဲ့, formal uses ၏"
    confidence: 0.60
    examples:
      correct: ["သူရဲ့ စာအုပ်"]
      incorrect: []

  # ---------- Topic / emphasis confusions ----------

  # Topic marker ကတော့ vs simple subject က
  - particle: "ကတော့"
    confused_with: "က"
    context: "contrastive_topic"
    description: "Contrastive topic uses ကတော့, not simple subject က"
    confidence: 0.65
    examples:
      correct: ["သူကတော့ လာမယ်"]
      incorrect: []

  # ---------- Purpose confusions ----------

  # Purpose particle ဖို့ vs formal အတွက်
  - particle: "ဖို့"
    confused_with: "အတွက်"
    context: "purpose_clause"
    description: "Colloquial purpose uses ဖို့, formal uses အတွက်"
    confidence: 0.65
    examples:
      correct: ["စားဖို့ ဝယ်တယ်"]
      incorrect: []

  # Benefactive/purpose အတွက် vs ဖို့
  - particle: "အတွက်"
    confused_with: "ဖို့"
    context: "formal_purpose"
    description: "Formal purpose/benefactive uses အတွက်"
    confidence: 0.65
    examples:
      correct: ["မိသားစု အတွက် လုပ်သည်"]
      incorrect: []

  # ---------- Conditional confusions ----------

  # Colloquial conditional ရင် vs formal လျှင်
  - particle: "ရင်"
    confused_with: "လျှင်"
    context: "colloquial_conditional"
    description: "Colloquial conditional uses ရင်, formal uses လျှင်/ပါက"
    confidence: 0.60
    examples:
      correct: ["မိုးရွာရင် မသွားဘူး"]
      incorrect: []

  # Formal conditional လျှင် vs colloquial ရင်
  - particle: "လျှင်"
    confused_with: "ရင်"
    context: "formal_conditional"
    description: "Formal conditional uses လျှင် or ပါက"
    confidence: 0.60
    examples:
      correct: ["မိုးရွာလျှင် မသွားပါ"]
      incorrect: []

  # ---------- Quotative confusions ----------

  # Quotative လို့ (saying) vs reason လို့ (because)
  - particle: "ဟု"
    confused_with: "လို့"
    context: "formal_quotative"
    description: "Formal quotative uses ဟု, colloquial uses လို့"
    confidence: 0.65
    examples:
      correct: ["ကောင်းသည်ဟု ပြောသည်"]
      incorrect: []

  # ---------- Comparative confusions ----------

  # Comparative ထက် vs ablative ကနေ
  - particle: "ထက်"
    confused_with: "ကနေ"
    context: "comparison"
    description: "Comparison uses ထက်, not source marker ကနေ"
    confidence: 0.65
    examples:
      correct: ["ဒီဟာက အဲဒီဟာထက် ကောင်းတယ်"]
      incorrect: []

  # ---------- Sentence-final particle confusions ----------

  # Affirmative ending တယ် with negation (should be ဘူး)
  - particle: "ဘူး"
    confused_with: "တယ်"
    context: "negative_sentence_ending"
    description: "Negated verbs end with ဘူး not တယ်"
    confidence: 0.80
    examples:
      correct: ["မသွားဘူး", "မစားဘူး"]
      incorrect: ["မသွားတယ်", "မစားတယ်"]

# ============================================================
# VERB-PARTICLE FRAME RULES
# Semantic verb classes with their compatible/incompatible
# particle patterns.
# ============================================================
verb_particle_frames:
  # Motion verbs require directional particles
  - verbs: ["သွား", "လာ", "ပြန်", "ထွက်", "ဝင်", "တက်", "ဆင်း"]
    required_particles: ["ကို", "မှ", "သို့"]
    incompatible_particles: ["မှာ", "တွင်", "၌"]
    note: "Motion verbs take directional particles, not static location"

  # Stative verbs require locative particles
  - verbs: ["ရှိ", "နေ", "ထိုင်", "အိပ်", "ရပ်", "တည်"]
    required_particles: ["မှာ", "တွင်", "၌"]
    incompatible_particles: []
    note: "Stative verbs take locative particles"

  # Transfer/giving verbs take recipient ကို
  - verbs: ["ပေး", "ပို့", "ပြ", "ပြော", "ပြန်ပေး"]
    required_particles: ["ကို"]
    incompatible_particles: []
    note: "Transfer/giving verbs take recipient marker ကို"

  # Achievement/result verbs often take ပြီ (completed)
  - verbs: ["ရောက်", "ပြီး", "ပြည့်", "ဆုံး", "ပျက်"]
    required_particles: ["ပြီ"]
    incompatible_particles: []
    note: "Achievement verbs often mark completion with ပြီ"

  # Verbs of searching/looking take target ကို or location မှာ
  - verbs: ["ရှာ", "ကြည့်", "စစ်"]
    required_particles: ["ကို", "မှာ"]
    incompatible_particles: []
    note: "Search verbs take object ကို or location မှာ"

  # Speaking/communication verbs
  - verbs: ["ပြော", "ပြန်ပြော", "ဆို", "မေး", "ဖြေ"]
    required_particles: ["ကို", "နဲ့", "နှင့်"]
    incompatible_particles: []
    note: "Communication verbs take addressee ကို or comitative နဲ့"

  # Comparison verbs/adjectives
  - verbs: ["ကောင်း", "ဆိုး", "မြင့်", "နိမ့်", "ကြီး", "ငယ်"]
    required_particles: ["ထက်"]
    incompatible_particles: []
    note: "Comparative adjectives take ထက် for comparison"

  # Verbs requiring instrumental/tool particle
  - verbs: ["ရေး", "ရိုက်", "ဖြတ်", "ထု", "ခုတ်"]
    required_particles: ["နဲ့", "နှင့်", "ဖြင့်"]
    incompatible_particles: []
    note: "Tool-using verbs take instrumental particle နဲ့/နှင့်/ဖြင့်"

  # ---------- Stative / existential verbs ----------

  # Existential verbs take locative, not directional
  - verbs: ["ရှိ", "ဖြစ်", "ဟုတ်", "ကျန်"]
    required_particles: ["မှာ", "တွင်", "၌", "ပါ"]
    incompatible_particles: ["ကို", "သို့"]
    note: "Stative/existential verbs require locative, not directional"

  # Existence with emphasis on remaining/lasting
  - verbs: ["ကျန်ရစ်", "ကျန်ရှိ", "တည်ရှိ", "တည်မြဲ"]
    required_particles: ["မှာ", "တွင်", "၌"]
    incompatible_particles: ["ကို", "သို့", "မှ"]
    note: "Residual/enduring existential verbs take locative only"

  # ---------- Giving / transfer verbs ----------

  # Giving verbs take benefactive recipient, not source
  - verbs: ["ပေး", "ပေးအပ်", "လှူ", "ချီး", "ဆုပေး"]
    required_particles: ["ကို", "အတွက်"]
    incompatible_particles: ["မှ"]
    note: "Giving/transfer verbs take benefactive ကို/အတွက်, not source မှ"

  # Sending/delivering verbs take recipient and destination
  - verbs: ["ပို့", "ပို့ဆောင်", "ပေးပို့", "လွှဲ", "လွှဲပြောင်း"]
    required_particles: ["ကို", "သို့", "အတွက်"]
    incompatible_particles: []
    note: "Sending/delivery verbs take recipient ကို or destination သို့"

  # ---------- Speaking / communication verbs ----------

  # Speaking verbs take quotative particle, not locative
  - verbs: ["ပြော", "ဆို", "ပြောဆို", "မေး", "ဖြေ", "ရှင်းပြ"]
    required_particles: ["ဟု", "လို့", "ကို", "နဲ့"]
    incompatible_particles: ["မှာ", "တွင်", "၌"]
    note: "Communication verbs take quotative ဟု/လို့ or addressee ကို, not locative"

  # Reporting/narrating verbs take quotative
  - verbs: ["ပြောပြ", "ပြောကြား", "ထုတ်ဖော်", "ကြေညာ", "အသိပေး"]
    required_particles: ["ဟု", "လို့", "ကို"]
    incompatible_particles: ["မှာ", "တွင်"]
    note: "Reporting verbs take quotative ဟု/လို့ or recipient ကို"

  # ---------- Perception verbs ----------

  # Perception verbs take object, not directional
  - verbs: ["မြင်", "ကြား", "သိ", "ခံစား", "တွေ့"]
    required_particles: ["ကို"]
    incompatible_particles: ["သို့"]
    note: "Perception verbs take object marker ကို, not directional သို့"

  # Perception with source — what is perceived from
  - verbs: ["ကြားသိ", "သတိပြု", "သတိထား", "အာရုံစိုက်"]
    required_particles: ["ကို", "မှာ"]
    incompatible_particles: ["သို့"]
    note: "Attentive perception verbs take object ကို or locative မှာ"

  # ---------- Causative verbs ----------

  # Causative verbs take object (the person caused to act)
  - verbs: ["ခိုင်း", "စေ", "ပြုလုပ်စေ", "အမိန့်ပေး"]
    required_particles: ["ကို", "အား"]
    incompatible_particles: ["မှာ", "တွင်"]
    note: "Causative verbs take object ကို/အား (person being caused to act)"

  # Permissive causatives (let/allow)
  - verbs: ["ခွင့်ပြု", "ခွင့်ပေး", "လွတ်ပေး", "သဘောတူ"]
    required_particles: ["ကို", "အား"]
    incompatible_particles: ["မှာ", "တွင်"]
    note: "Permissive verbs take object ကို/အား of the person permitted"

  # ---------- Cognitive verbs ----------

  # Cognitive verbs take complementizer, not locative
  - verbs: ["ထင်", "ယူဆ", "ယုံ", "နားလည်", "သဘောပေါက်"]
    required_particles: ["ဟု", "လို့"]
    incompatible_particles: ["မှာ", "တွင်", "၌"]
    note: "Cognitive verbs take complementizer ဟု/လို့, not locative"

  # Belief/opinion verbs
  - verbs: ["ယုံကြည်", "သံသယရှိ", "မှတ်ယူ", "မှတ်ထင်"]
    required_particles: ["ဟု", "လို့", "ကို"]
    incompatible_particles: ["မှာ", "တွင်"]
    note: "Belief verbs take complementizer ဟု/လို့ or object ကို"

  # ---------- Desire / want verbs ----------

  # Desire verbs take infinitive complement, not object particle
  - verbs: ["လို", "ချင်", "အလိုရှိ", "လိုလား", "တောင့်တ"]
    required_particles: ["ဖို့", "ရန်"]
    incompatible_particles: ["ကို", "မှာ"]
    note: "Desire/want verbs take infinitive ဖို့/ရန်, not object ကို"

  # Intention/plan verbs
  - verbs: ["ကြံ", "စိတ်ကူး", "စီစဉ်", "ရည်ရွယ်", "ရည်မှန်း"]
    required_particles: ["ဖို့", "ရန်", "ဟု"]
    incompatible_particles: ["ကို"]
    note: "Intention verbs take purpose ဖို့/ရန် or complementizer ဟု"

  # ---------- Comparative constructions ----------

  # Comparative adjectives take ထက် for comparison standard
  - verbs: ["ပို", "သာ", "လွန်", "ကျော်"]
    required_particles: ["ထက်"]
    incompatible_particles: ["ကို", "မှာ"]
    note: "Degree/comparative modifiers take ထက် for comparison standard"

  # Similative/approximative constructions
  - verbs: ["တူ", "ဆင်တူ", "တူညီ", "ကွာ"]
    required_particles: ["နဲ့", "နှင့်", "လို", "လောက်"]
    incompatible_particles: ["ကို"]
    note: "Similative verbs take comitative နဲ့ or approximative လို/လောက်"

  # ---------- Progressive aspect verbs ----------

  # Progressive/continuative auxiliary verbs
  - verbs: ["နေ", "လျက်ရှိ", "ဆဲ", "လျက်"]
    required_particles: ["မှာ", "တွင်"]
    incompatible_particles: ["ကို", "သို့"]
    note: "Progressive/continuative auxiliaries are compatible with locative, not directional"

  # Habitual/repeated action markers
  - verbs: ["တတ်", "လေ့ရှိ", "မြဲ", "ကြိမ်ဖန်များစွာ"]
    required_particles: ["ကို", "မှာ"]
    incompatible_particles: []
    note: "Habitual aspect markers take object ကို or locative မှာ for context"

  # ---------- Resultative / completion verbs ----------

  # Resultative verbs take aspect completion markers
  - verbs: ["ရ", "ပြီ", "ပြီး", "ပြီးစီး"]
    required_particles: ["ပြီ", "ပြီး"]
    incompatible_particles: ["သို့"]
    note: "Resultative verbs are compatible with completion markers, not directional"

  # Inchoative (beginning) verbs
  - verbs: ["စတင်", "စ", "အစပြု", "ကြိုးစား"]
    required_particles: ["ဖို့", "ရန်", "ကို"]
    incompatible_particles: []
    note: "Inchoative verbs take purpose ဖို့/ရန် or object ကို"

  # ---------- Emotional / psychological verbs ----------

  # Emotion verbs take object (stimulus) or cause
  - verbs: ["ကြောက်", "ရွံ့", "မုန်း", "ချစ်", "နှစ်သက်", "ဝမ်းနည်း"]
    required_particles: ["ကို", "လို့", "ကြောင့်"]
    incompatible_particles: ["သို့", "မှ"]
    note: "Emotion verbs take object ကို (stimulus) or causal လို့/ကြောင့်"

  # Volitional emotion verbs (wanting, hoping)
  - verbs: ["မျှော်လင့်", "ဆုတောင်း", "ဆန္ဒရှိ", "မျှော်မှန်း"]
    required_particles: ["ဖို့", "ရန်", "ဟု"]
    incompatible_particles: ["ကို", "မှာ"]
    note: "Volitional emotion verbs take purpose ဖို့/ရန် or complementizer ဟု"

  # ---------- Acquisition / possession verbs ----------

  # Acquisition verbs take source or object
  - verbs: ["ဝယ်", "ရယူ", "ရ", "လက်ခံ", "လက်ခံရရှိ"]
    required_particles: ["ကို", "မှ"]
    incompatible_particles: ["သို့"]
    note: "Acquisition verbs take object ကို or source မှ, not directional သို့"

  # Possession/ownership verbs take locative context
  - verbs: ["ပိုင်", "ဆိုင်", "ပိုင်ဆိုင်", "ကိုင်"]
    required_particles: ["ကို"]
    incompatible_particles: ["မှ", "သို့"]
    note: "Possession verbs take object ကို, not source/directional"

  # ---------- Separation / removal verbs ----------

  # Separation verbs take source marker
  - verbs: ["ခွဲ", "ဖယ်", "ထုတ်", "ဖယ်ရှား", "ဖြုတ်"]
    required_particles: ["မှ", "ကနေ"]
    incompatible_particles: ["မှာ", "တွင်"]
    note: "Separation/removal verbs take source မှ/ကနေ, not static locative"
