# Myanmar Homophones - Version 1.1
# Real-word errors arising from homophone confusion
#
# This file contains mapping of words to their homophones.
# Format: word: [homophone1, homophone2, ...]
#
# Only TRUE homophones or near-homophones belong here.
# One-directional ha-htoe typos (e.g., မာ→မှာ where only one form is a word)
# are handled by typo_corrections.yaml. This file covers ha-htoe pairs
# where BOTH forms are valid words (real-word homophone confusion).
#
# Schema: https://myspellchecker.dev/schemas/homophones/v1.0

