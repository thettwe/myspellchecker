# ============================================================
# HOMOPHONE MAP
# ============================================================
homophones:
  # ============================================================
  # Ya-pin (ျ) vs Ya-yit (ြ) - Very common confusion
  # These medials are phonetically close in many dialects.
  # ============================================================
  "ကျ": ["ကြ"]           # fall vs do/star
  "ကြ": ["ကျ"]
  "ကျောင်း": ["ကြောင်း"]  # school vs reason/line
  "ကြောင်း": ["ကျောင်း"]
  "ကျား": ["ကြား"]        # tiger vs hear/between
  "ကြား": ["ကျား"]
