  "ဝတ်": ["ဝက်", "ဝပ်"]    # wear/duty vs pig vs prostrate
  "ဝက်": ["ဝတ်", "ဝပ်"]
  "ဝပ်": ["ဝတ်", "ဝက်"]     # prostrate/squat vs wear vs pig
