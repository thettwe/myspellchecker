  "ဆင်": ["စင်"]
  "စူး": ["ဆူး"]           # pierce vs thorn
  "ဆူး": ["စူး"]
  "စေး": ["ဆေး"]           # sticky vs medicine
  "ဆေး": ["စေး"]
  "ဗူး": ["ဘူး"]           # tin/can vs gourd/negative
  "ဘူး": ["ဗူး", "ဖူး"]    # gourd/negative vs tin/can vs flower/experience
  "ဆု": ["စု"]             # prize vs gather
  "စု": ["ဆု"]
  "ဆိုး": ["စိုး"]           # bad/dye vs rule/worry
  "စိုး": ["ဆိုး"]
  "ဆား": ["စား"]            # salt vs eat (aspiration confusable)
  # Sprint I-2: စရာ → ဆရာ (BM-CONF-010/012). Unidirectional — စရာ
  # (errand/thing-to-do) is a valid word but contextually rare as a noun;
  # ဆရာ (teacher) is the standard dictionary form. Reverse mapping is
  # omitted to protect legitimate စရာ usage.
  "စရာ": ["ဆရာ"]
  # Aspirated/labial pairs
  "ဖူး": ["ဘူး"]            # flower/experience vs gourd/negation (pha↔ba)
  "ဘိုက်": ["ဗိုက်"]         # belly (informal) vs belly (standard)
  "ဗိုက်": ["ဘိုက်"]

