  "ခိုင်": ["ကိုင်"]
  "ကွဲ": ["ခွဲ"]              # break/split vs divide/separate
  "ခွဲ": ["ကွဲ"]
  # ပ/ဖ (pa/pha)
  "ပုံ": ["ဖုံ"]              # shape/image vs powder/dust
  "ဖုံ": ["ပုံ"]
  "ပေါ်": ["ဖော်"]           # appear/surface vs reveal
  "ဖော်": ["ပေါ်"]
  # ဆ/စ, ဘ/ဗ
