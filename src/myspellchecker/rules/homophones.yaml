# ============================================================
# CONTEXT-DEPENDENT HOMOPHONE DISAMBIGUATION
# Rules where the correct form depends on surrounding context
# ============================================================
context_dependent:
  left_context_rules:
    # When wrong form appears after specific left-context words/suffixes,
    # flag it as the correct form.
    - wrong: "ဖက်"
      correct: "ဖတ်"
      meaning: "embrace → read (when preceded by reading-related words)"
      confidence: 0.90
      left_context_words:
        - "စာအုပ်"       # book
        - "စာ"           # text/letter
        - "သတင်းစာ"      # newspaper
        - "ဂျာနယ်"       # journal
        - "မဂ္ဂဇင်း"      # magazine
        - "မှတ်တမ်း"     # record/document
        - "အမိန့်စာ"     # decree/order
        - "စာချုပ်"       # contract
        - "ဥပဒေ"         # law
        - "စာမျက်နှာ"    # page
        - "သင်ခန်းစာ"    # lesson
        - "ဘာသာစကား"     # language
      left_context_suffixes:
        # If preceding word ends with any of these suffixes, also trigger
        - "စာ"           # text/letter suffix
        - "တမ်း"         # record suffix
        - "ချုပ်"         # contract suffix
        - "အုပ်"          # book/bundle suffix

    # climb → afford/ability (when preceded by quantity/degree words)
    - wrong: "တက်"
      correct: "တတ်"
      meaning: "climb → can afford/ability (when in abilitative question pattern)"
      confidence: 0.85
      left_context_words:
        - "ဘယ်လောက်"   # how much
        - "ဘယ်နှစ်"     # how many
        - "ဘယ်အထိ"     # how far
      left_context_suffixes: []
