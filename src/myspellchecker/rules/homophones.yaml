  # ============================================================
  # တ/ထ (ta/hta) — among the most common Myanmar confusions
  "တင်": ["ထင်"]             # present/put vs think/expect
  "ထင်": ["တင်"]
  "တား": ["ထား"]             # prevent/block vs keep/put
