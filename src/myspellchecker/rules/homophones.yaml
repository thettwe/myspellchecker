# ============================================================
# HOMOPHONE MAP
# ============================================================
homophones:
  # ============================================================
  # Ya-pin (ျ) vs Ya-yit (ြ) - Very common confusion
  # These medials are phonetically close in many dialects.
  # ============================================================
  "ကျ": ["ကြ"]           # fall vs do/star
  "ကြ": ["ကျ"]
  "ကျောင်း": ["ကြောင်း"]  # school vs reason/line
  "ကြောင်း": ["ကျောင်း"]
  "ကျား": ["ကြား"]        # tiger vs hear/between
  "ကြား": ["ကျား"]
  "ကြမ်း": ["ကျမ်း"]      # rough vs scripture
  "ကျမ်း": ["ကြမ်း"]
  "ချ": ["ခြ"]            # put down vs (measure)
  "ခြ": ["ချ"]
  "ပြည်": ["ပျည်"]        # country vs pus (rare)
  "ကြည့်": ["ကျည်"]       # look vs bullet
  "ကျည်": ["ကြည့်"]
  "ပြ": ["ပျ"]             # show vs spread
  "ပျ": ["ပြ"]
  "ပြား": ["ပျား"]         # flat vs bee
  "ပျား": ["ပြား"]
  "မြ": ["မျ"]             # high/bury vs (rare)
  "မျ": ["မြ"]
  "မြင်": ["မျင်"]         # see vs (rare)
  "မျင်": ["မြင်"]
  # v1.3 additions — high-frequency ကြ/ကျ pairs
  "ကြီး": ["ကျီး"]          # big vs crow
  "ကျီး": ["ကြီး"]
  "ကြောက်": ["ကျောက်"]      # fear vs stone/rock
  "ကျောက်": ["ကြောက်"]
  "ကြော": ["ကျော"]          # tendon/sinew vs back (body)
  "ကျော": ["ကြော"]
  "ကြက်": ["ကျက်"]          # chicken vs memorize
  "ကျက်": ["ကြက်"]

  # Sprint I-2 additions — medial ya-pin/ya-yit confusions (unidirectional
  # to avoid FPR on common forms)
  "ကြွေး": ["ကျွေး"]        # debt/credit vs feed (BM-525)

  # ============================================================
  # Nasal Finals (ံ vs န် vs မ် vs င်) - Common confusions
  # ============================================================
  "ကံ": ["ကန်", "ကင်"]       # luck vs kick/lake vs (rare)
  "ကန်": ["ကံ", "ကင်"]
  "ခန်း": ["ခမ်း"]         # room vs dry up
  "ခမ်း": ["ခန်း"]
  # Removed: "စံ"/"စန်" pair — "စန်" has no attested meaning in standard Burmese.
  # If "စန်" appears, it is likely a misspelling of "စံ", not a homophone.
  "တန်": ["တံ"]            # value vs rod/stick
  "တံ": ["တန်"]
  "လမ်း": ["လွမ်း", "လန်း", "လှမ်း"] # road vs miss/fresh vs reach
  "လွမ်း": ["လမ်း"]
  "သံ": ["သန်"]            # sound vs sharp
  "သန်": ["သံ"]
  # Removed: "ပန်း"/"ပံ" pair — "ပံ" does not mean "normal" (that is "ပုံမှန်").
  # "ပံ" is not a recognized standalone word in standard Burmese.
  "ကျန်": ["ကျံ"]          # remain vs (rare)
  "ကျံ": ["ကျန်"]
  "မှန်": ["မှံ"]           # mirror/true vs (rare)
  "ခံ": ["ခန်"]             # endure vs (rare)
  "ခန်": ["ခံ"]
  "ရန်": ["ရံ"]             # enemy vs occasional
  "ရံ": ["ရန်"]
  "စမ်း": ["စန်း"]           # stream/test vs moon/luck
  "စန်း": ["စမ်း"]
  "လန်း": ["လမ်း"]
  "တမ်း": ["တန်း"]           # yearn vs line/class
  "တန်း": ["တမ်း"]
  "နမ်း": ["နန်း"]           # kiss vs palace
  "နန်း": ["နမ်း"]
  "ဆမ်း": ["ဆန်း"]           # sprinkle vs strange/new
  "ဆန်း": ["ဆမ်း"]
  "သိမ်း": ["သိန်း"]          # store/keep vs hundred thousand
  "သိန်း": ["သိမ်း"]
  "ဝမ်း": ["ဝန်း"]           # belly vs surround/compound
  "ဝန်း": ["ဝမ်း"]

  # ============================================================
  # Vowel Length Confusions (ု vs ူ, ိ vs ီ)
  # ============================================================
  "ခေါင်း": ["ခေါင်"]      # head vs desolate/empty
  "ခေါင်": ["ခေါင်း"]
  "လူ": ["လု", "လှူ"]       # person vs (rare vowel-length) vs donate (ha-htoe)
  "လု": ["လူ"]
  "ပူ": ["ပု"]              # hot vs (rare)
  "ပု": ["ပူ"]
  "မှူး": ["မှု"]           # chief vs activity
  "မှု": ["မှူး"]
  "သူ": ["သု"]              # he/she vs (rare)
  "သု": ["သူ"]
  "ညီ": ["ညိ"]             # younger brother vs squeeze
  "ညိ": ["ညီ"]
  "သီ": ["သိ"]              # fruit/ripen vs know
  "သိ": ["သီ"]
  "စီ": ["စိ", "ဆီ"]        # arrange vs (rare/bound morpheme) vs oil/to
  "စိ": ["စီ"]
  "ဆီ": ["စီ"]              # oil/to(directional) vs arrange

  # ============================================================
  # Wa-hswe (ွ) vs Lower vowels (ု) - True near-homophones only
  # ============================================================
  "ခွန်": ["ခုန်"]          # strength vs jump
  "ခုန်": ["ခွန်"]

  # ============================================================
