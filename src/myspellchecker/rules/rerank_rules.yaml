# ============================================================
# PARAMETRIC RULES
# Algorithmic rules parameterized via YAML.
# Each rule references a template function in parametric_templates.py.
# Templates:
#   trailing_context_promote — scan trailing text, promote
#   stem_exclusion_promote — strip suffix, check exclusions, promote
#   tail_cue_promote — match cue list, promote
#   token_context_inject — match token shape, construct target, inject
# ============================================================
parametric_rules:
  # A1a: zero-vs-wa numeric context (ဝယ် promotion)
  - id: "zero_wa_buy_promote"
    template: "trailing_context_promote"
    enabled: true
    params:
      error: "၀"
      required_suggestions: ["ဝ", "ဝယ်"]
      trailing_window: 6
      trailing_patterns: ["၀ယ်စ", "ဝယ်စ"]
      nearby_error_fallback: true
      target: "ဝယ်"
      rule_id: "contextual_promotions:zero_wa_buy"
    meaning: "digit zero → buy (ဝယ်) in shopping context"

  # A1b: zero-vs-wa letter promotion (no adjacent digits)
  - id: "zero_wa_letter_promote"
    template: "trailing_context_promote"
    enabled: true
    params:
      error: "၀"
      required_suggestions: ["ဝ"]
      no_adjacent_digits: true
      target: "ဝ"
      rule_id: "contextual_promotions:zero_wa_letter"
    meaning: "digit zero → letter wa when not adjacent to digits"

  # Sequential particle stem extraction (တော် → တော့)
  - id: "sequential_taw_to_toe"
    template: "stem_exclusion_promote"
    enabled: true
    params:
      error: "တော်"
      error_type: "context_probability"
      required_suggestion: "တော့"
      token_ends_with: "တော်"
      exclusion_list_attr: "sequential_particle_noun_exclusions"
      target: "တော့"
      promote_if_needed: true
      rule_id: "contextual_promotions:sequential_taw_to_toe"
    meaning: "particle confusion: royal/formal → softener"

  # School context tail cue matching
  - id: "school_context_kyaung"
    template: "tail_cue_promote"
    enabled: true
    params:
      error_any: ["ကွောင်း", "ကြောင်း"]
      error_type: "context_probability"
      required_suggestion: "ကျောင်း"
      tail_cue_list_attr: "school_context_tail_cues"
      target: "ကျောင်း"
      promote_if_needed: true
      rule_id: "contextual_promotions:school_context_kyaung"
    meaning: "school (medial confusion resolved by context cues)"

  # Syntax error dynamic target (progressive verb + "တယ်")
  - id: "syntax_error_nae_tay"
    template: "token_context_inject"
    enabled: true
    params:
      error: "နေ"
      error_type: "syntax_error"
      token_ends_with: "နေ"
      target_mode: "token_append"
      target_suffix: "တယ်"
      rule_id: "parametric:syntax_error_nae_tay"
    meaning: "progressive verb missing ending"

  # Tense mismatch dynamic target (strip ခဲ့မည် + "မည်")
  - id: "tense_mismatch_strip_past"
    template: "token_context_inject"
    enabled: true
    params:
      error: "ခဲ့"
      error_type: "tense_mismatch"
      no_suggestions: true
      token_ends_with: "ခဲ့မည်"
      target_mode: "token_strip_append"
      strip_suffix: "ခဲ့မည်"
      append_suffix: "မည်"
      rule_id: "parametric:tense_mismatch_strip_past"
    meaning: "past+future conflict → keep future only"

  # Positional check (နော်က → delete stray particle)
  - id: "naw_ka_positional_delete"
    template: "token_context_inject"
    enabled: true
    params:
      error: "က"
      error_type: "syntax_error"
      lookback_window: 4
      lookback_pattern: "နော်က"
      target_mode: "static"
      target: ""
      rule_id: "parametric:naw_ka_positional_delete"
    meaning: "delete stray ka after nauk"

  # A4a: missing_conjunction negation (token starts with မ → ဘူး)
  - id: "missing_conjunction_negation"
    template: "token_context_inject"
    enabled: true
    params:
      error: "တယ်"
      error_type: "missing_conjunction"
      token_starts_with: "မ"
      target_mode: "static"
      target: "ဘူး"
      rule_id: "parametric:missing_conjunction_negation"
    meaning: "negation needs ဘူး ending"

  # A4b: missing_conjunction sentence boundary
  - id: "missing_conjunction_sentence_break"
    template: "token_context_inject"
    enabled: true
    params:
      error: "တယ်"
      error_type: "missing_conjunction"
      sentence_starts_with: "တယ် ငါ"
      target_mode: "static"
      target: "တယ်။ ငါ"
      rule_id: "parametric:missing_conjunction_sentence_break"
    meaning: "sentence boundary missing punctuation"
