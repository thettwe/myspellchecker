# Visarga/Aukmyit/Asat Correction Table - Version 1.0
#
# Unconditional corrections where the incorrect form is NOT a valid
# Myanmar word (OOV in production DB) or has extremely low frequency
# relative to the correct form.
#
# These corrections fire without context checking — the wrong form
# is never (or almost never) the intended word.
#
# Categories:
#   - missing_visarga: Missing း (U+1038)
#   - missing_aukmyit: Missing ့ (U+1037)
#   - missing_asat: Missing ် (U+103A)
#   - extra_aukmyit: Spurious ့ added
#   - mhu_mu_confusion: မှု/မူ confusion in compound suffixes
#
# FPR notes:
#   - All entries verified OOV or freq < 100 in production DB (2026-04-14)
#   - Pairs where both forms are common (e.g., ရုံ/ရုံး, ကောင်/ကောင်း)
#     are excluded — they need context-dependent disambiguation
#
# Schema: https://myspellchecker.dev/schemas/visarga-corrections/v1.0

