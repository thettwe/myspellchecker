# Myanmar POS Inference Rules - Version 1.0
# Rules for inferring Part-of-Speech tags for unknown words
#
# This file contains:
# - Prefix patterns (e.g. "အ" -> Noun)
# - Proper noun suffix patterns (e.g. "မြို့" -> Noun)
# - Suffix probability rules for N/V/ADV
#
# Schema: https://myspellchecker.dev/schemas/pos-inference/v1.0

version: "1.0.0"
category: "pos_inference"
description: "Rules for POS guessing based on morphology"

metadata:
  created_date: "2025-12-30"
  last_updated: "2026-01-24"
  changes:
    - date: "2026-01-24"
      description: "Expanded prefix patterns and proper noun suffixes"

# ============================================================
# PREFIX PATTERNS
# ============================================================
prefixes:
  - prefix: "အ"
    pos: "N"
    confidence: 0.75
    description: "Nominalizer prefix - converts verbs/adjectives to nouns"
    exceptions: ["အဲ", "အို", "အင်း", "အော်", "အိုး"]

  - prefix: "မ"
    pos: "V"
    confidence: 0.60
    description: "Negation prefix - implies verb follows"
    exceptions: ["မိ", "မေ", "မယ်", "မုန့်", "မြင်း", "မျက်"]

  # Additional prefix patterns for expanded morphological coverage
  - prefix: "ကျွန်"
    pos: "N"
    confidence: 0.85
    description: "First person humble prefix"
    exceptions: ["ကျွန်း"]

  - prefix: "ခင်ဗျား"
    pos: "N"
    confidence: 0.90
    description: "Second person polite form"
    exceptions: []

  - prefix: "ရှေး"
    pos: "N"
    confidence: 0.70
    description: "Ancient/former prefix"
    exceptions: []

  - prefix: "သစ်"
    pos: "ADJ"
    confidence: 0.65
    description: "New prefix (modifier)"
    exceptions: ["သစ်ပင်", "သစ်သီး", "သစ်တော", "သစ်ကား"]

  - prefix: "ဟောင်း"
    pos: "ADJ"
    confidence: 0.70
    description: "Old/former prefix (modifier)"
    exceptions: []

  - prefix: "ပြည်တွင်း"
    pos: "ADJ"
    confidence: 0.80
    description: "Domestic/internal prefix"
    exceptions: []

  - prefix: "ပြည်ပ"
    pos: "ADJ"
    confidence: 0.80
    description: "Foreign/external prefix"
    exceptions: []

  - prefix: "နိုင်ငံခြား"
    pos: "ADJ"
    confidence: 0.85
    description: "Foreign/international prefix"
    exceptions: []

  - prefix: "အစိုးရ"
    pos: "N"
    confidence: 0.75
    description: "Government (noun modifier in compounds)"
    exceptions: []

  - prefix: "ပုဂ္ဂလိက"
    pos: "ADJ"
    confidence: 0.80
    description: "Private sector prefix"
    exceptions: []

