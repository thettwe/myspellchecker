# Myanmar Homophone Confusion Rules - Version 1.0
# Context-dependent homophone disambiguation for dot-below (aukmyit)
# and left-context-based homophone detection.
#
# Used by PostNormalizationDetectorsMixin to detect homophones where
# surrounding context (left or right) disambiguates the correct form.
#
# All text uses post-normalization Unicode forms (tall AA U+102B -> U+102C).
# The loader applies _norm_dict_context() after loading.

version: "1.0.0"
category: "homophone_confusion"
description: >
  Context-dependent homophone rules. Four categories:
  (1) missing dot-below with right-context triggers,
  (2) extra dot-below with right-context triggers,
  (3) left-context homophones with exact triggers,
  (4) suffix-based generalizations for left context.

metadata:
  created_date: "2026-03-19"
  last_updated: "2026-03-19"
  source: >
    Extracted from hardcoded constants in
    core/detectors/post_normalization.py
  notes: >
    Triggers are context words that disambiguate the correct form.
    Right-context: word immediately following the target.
    Left-context: word(s) preceding the target within a 5-token window.

# ============================================================
# MISSING DOT-BELOW (aukmyit)
# Words where missing dot-below creates a valid but wrong word.
# Key = wrong form (without dot-below).
# Flagged when followed by one of the right-context triggers.
# ============================================================
aukmyit_context:
  "ထည်":
    correct: "ထည့်"
    triggers:
      - "လိုက်"
      - "ပေး"
      - "သွင်း"
      - "ထား"
      - "ပါ"
      - "မယ်"

# ============================================================
# EXTRA DOT-BELOW (aukmyit)
# Words where an EXTRA dot-below creates a valid but wrong word.
# Key = wrong form (with dot-below).
# Flagged when followed by one of the right-context triggers.
# Inverse of aukmyit_context (handles MISSING dot-below).
# ============================================================
extra_aukmyit_context:
  "ပြော့":
    correct: "ပြော"
    triggers:
      - "ကြား"
      - "ပြ"
      - "ဆို"
      - "ခွင့်"
      - "ရေး"
      - "သည်"
      - "ခဲ့"
      - "မည်"
      - "ပါ"

# ============================================================
# LEFT-CONTEXT HOMOPHONES
# Homophones where the correct form depends on preceding word(s).
# Key = wrong form.
# Flagged when preceded by one of the left-context triggers
# (exact match or contained in preceding token, within 5-token window).
# ============================================================
left_context_homophones:
  "ဖက်":
    correct: "ဖတ်"
    triggers:
      - "စာအုပ်"
      - "စာ"
      - "သတင်းစာ"
      - "ဂျာနယ်"
      - "မဂ္ဂဇင်း"
      - "မှတ်တမ်း"
      - "အမိန့်စာ"
      - "စာချုပ်"
      - "ဥပဒေ"
      - "စာမျက်နှာ"
      - "သင်ခန်းစာ"
      - "ဘာသာစကား"

# ============================================================
# LEFT-SUFFIX TRIGGERS
# Suffix-based trigger generalization for left-context homophones.
# If any preceding word ends with one of these suffixes, it
# counts as a trigger (substring match handles appended particles).
# ============================================================
left_suffix_triggers:
  "ဖက်":
    correct: "ဖတ်"
    suffixes:
      - "စာ"
      - "တမ်း"
      - "ချုပ်"
      - "အုပ်"
