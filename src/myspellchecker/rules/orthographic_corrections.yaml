  - incorrect: "မျြတ်"
    correct: "မြတ်"
    meaning: "noble/precious — double medial ျြ→ြ"
    confidence: 0.95

  # --- Vowel / anusvara errors in compounds ---

  - incorrect: "ကွန်ပျုတာ"
    correct: "ကွန်ပျူတာ"
    meaning: "computer (vowel u→uu)"
    confidence: 0.90

  - incorrect: "ပတ်ဝန်ကျင်"
    correct: "ပတ်ဝန်းကျင်"
    meaning: "environment (missing anusvara)"
    confidence: 0.90

  - incorrect: "သိချင်း"
    correct:
      - "သီချင်း"
      - "သီ"
