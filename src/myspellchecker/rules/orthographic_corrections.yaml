# ============================================================
# MEDIAL CONFUSION — CONTEXTUAL
# Triggered ONLY when followed by specific tokens.
# ============================================================
medial_confusion_contextual:
  - incorrect: "ကြောင်း"
    correct: "ကျောင်း"
    followed_by: ["ကို", "သား", "ပို့", "အုပ်", "တိုက်"]
    meaning: "school (not reason) — context: followed by school-related word"
    confidence: 0.90

  - incorrect: "ကြး"
    correct: "ကျေး"
    followed_by: ["ဇူး"]
    meaning: "gratitude (ကျေးဇူး) — context: followed by ဇူး"
    confidence: 0.90

# ============================================================
# AUKMYIT (DOT-BELOW) CONFUSION
# Missing or extra dot-below (့) creates a valid but wrong word.
# Context-dependent corrections.
# ============================================================
aukmyit_confusion:
  # Missing dot-below
  - incorrect: "ထည်"
    correct: "ထည့်"
    followed_by: ["လိုက်", "ပေး", "သွင်း", "ထား", "ပါ", "မယ်"]
    meaning: "put in (missing dot-below)"
    confidence: 0.85

  # Extra dot-below
  - incorrect: "ပြော့"
    correct: "ပြော"
    followed_by: ["ကြား", "ပြ", "ဆို", "ခွင့်", "ရေး", "သည်", "ခဲ့", "မည်", "ပါ"]
    meaning: "speak (extra dot-below)"
    confidence: 0.85

# ============================================================
# VOWEL REORDER
# Pre-normalization vowel ordering errors.
# Detected before Unicode normalization silently fixes them.
# ============================================================
vowel_reorder:
  - incorrect: "ကေါင်း"
    correct:
      - "ကောင်း"
      - "ခေါင်း"
    meaning: "good/well OR head (ambiguous vowel reorder)"
    confidence: 0.85

  - incorrect: "ေကာင်း"
    correct:
      - "ကောင်း"
    meaning: "good/well (Zawgyi-style leading ေ)"
    confidence: 0.85

# ============================================================
# COLLOQUIAL CONTRACTIONS
# Informal/casual spelling → standard form.
# ============================================================
colloquial_contractions:
  - incorrect: "ကျနော်"
    correct: "ကျွန်တော်"
    meaning: "I (polite male) — casual contraction"
    confidence: 0.85

# ============================================================
# STACKING COMPLETIONS
# Incomplete Pali/Sanskrit consonant stacking.
# ============================================================
stacking_completions:
  - incorrect: "ဘဏ္ာ"
    correct: "ဘဏ္ဍာ"
    meaning: "treasury (missing stacked consonant)"
    confidence: 0.90
