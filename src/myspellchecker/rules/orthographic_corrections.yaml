# Myanmar Orthographic Corrections - Version 1.0
# Orthographic correction rules consolidated from hardcoded Python dicts
#
# This file contains orthographic correction rules for Myanmar text:
# - Medial consonant confusion (unconditional and contextual)
# - Aukmyit (dot-below) confusion
# - Vowel reorder errors (pre-normalization)
# - Colloquial contractions
# - Incomplete Pali/Sanskrit stacking
#
# IMPORTANT: When `correct` is a list, ordering matters — first entry is
# the preferred suggestion. This affects suggestion ranking in the UI.
#
# Schema: https://myspellchecker.dev/schemas/orthographic-corrections/v1.0

version: "1.0.0"
category: "orthographic_corrections"
description: "Orthographic correction rules for medial confusion, vowel reorder, and stacking errors"

metadata:
  created_date: "2026-03-08"
  last_updated: "2026-03-18"
  total_entries: 58
  source: "Consolidated from hardcoded dicts in core/spellchecker.py"
  notes: "List-valued 'correct' fields are order-sensitive (first = preferred suggestion)"

# ============================================================
# MEDIAL CONFUSION — UNCONDITIONAL
# Wrong medial form is ALWAYS incorrect regardless of context.
# ============================================================
medial_confusion_unconditional:
  # --- Ya-pin (ျ) vs Ya-yit (ြ) ---

  - incorrect: "ကြေးဇူး"
    correct: "ကျေးဇူး"
    meaning: "gratitude (not copper-value)"
    confidence: 0.95

  - incorrect: "ကျိုးစား"
    correct: "ကြိုးစား"
    meaning: "try hard (not broken+eat)"
    confidence: 0.95

  - incorrect: "ဖေဆို"
    correct:
      - "ဖြေ"
      - "ဖြေဆို"
    meaning: "answer/respond (morpheme first)"
    confidence: 0.90

  - incorrect: "ကြောင်းသား"
    correct:
      - "ကျောင်းသား"
      - "ကျောင်း"
