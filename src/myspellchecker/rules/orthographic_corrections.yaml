  # --- Virama / stacking confusion ---

  - incorrect: "ကိစ်စ"
    correct: "ကိစ္စ"
    meaning: "matter/affair (asat→virama for Pali stacking)"
    confidence: 0.90

  # --- Miscellaneous unconditional ---

  - incorrect: "ပြော့ပြ"
