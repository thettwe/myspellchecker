    confidence: 0.95

  - incorrect: "ပျည်ပ"
    correct: "ပြည်ပ"
    meaning: "foreign/external"
    confidence: 0.95

  - incorrect: "ပျည်"
    correct: "ပြည်"
    meaning: "country/land (wrong medial ျ→ြ)"
    confidence: 0.95

  # --- Double medial ျြ (invalid) → single medial ---

  - incorrect: "ကျြန်တော်"
    correct:
      - "ကျွန်တော်"
      - "ကျွန်"
    meaning: "I (polite male) — invalid double medial ျြ→ွ"
    confidence: 0.95

  - incorrect: "ကျြန်"
    correct: "ကျွန်"
    meaning: "servant/slave — invalid double medial ျြ→ွ"
    confidence: 0.95

  - incorrect: "မျြန်မာ့"
    correct: "မြန်မာ့"
    meaning: "Myanmar's (possessive)"
    confidence: 0.95

  - incorrect: "မျြန်မာ"
    correct: "မြန်မာ"
    meaning: "Myanmar"
    confidence: 0.95

  - incorrect: "မျြန်မြန်"
    correct: "မြန်မြန်"
    meaning: "quickly/fast (reduplication)"
    confidence: 0.95

  - incorrect: "မျြန်"
    correct: "မြန်"
    meaning: "fast — double medial ျြ→ြ"
    confidence: 0.95

  - incorrect: "မျြတ်စွာ"
    correct: "မြတ်စွာ"
    meaning: "noble/precious+suffix"
