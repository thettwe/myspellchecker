    confidence: 0.95

  - incorrect: "ကြောင်းပို့"
    correct:
      - "ကျောင်း"
      - "ကျောင်းပို့"
    meaning: "school bus/send to school (morpheme first)"
    confidence: 0.90

  - incorrect: "ကျန်မာ"
    correct:
      - "ကျန်း"
      - "ကျန်းမာ"
    meaning: "healthy (morpheme first)"
    confidence: 0.90

  - incorrect: "စာဖက်"
    correct:
      - "ဖတ်"
      - "စာဖတ်"
    meaning: "read (morpheme first)"
    confidence: 0.90

  - incorrect: "ထွက်ခြာ"
    correct:
      - "ခွာ"
      - "ထွက်ခွာ"
    meaning: "leave/depart (morpheme first)"
    confidence: 0.90

  - incorrect: "ပျည်ထောင်စု"
    correct: "ပြည်ထောင်စု"
    meaning: "union/federation"
    confidence: 0.95

  # v2.3 — new medial confusion entries
  - incorrect: "ကျေညာ"
    correct: "ကြေညာ"
    meaning: "announce/declare (ya-yit→ya-pin: ကျေ→ကြေ)"
    confidence: 0.95

  - incorrect: "ပျောင်း"
    correct: "ပြောင်း"
    meaning: "change/move (ya-yit→ya-pin: ပျောင်း→ပြောင်း)"
    confidence: 0.95

  - incorrect: "ပျည်နယ်"
    correct: "ပြည်နယ်"
    meaning: "state/region"
    confidence: 0.95

  - incorrect: "ပျည်တွင်း"
    correct: "ပြည်တွင်း"
