  - incorrect: "ပုဂံခတ်"
    correct:
      - "ခေတ်"
      - "ပုဂံခေတ်"
    meaning: "Bagan era (morpheme first)"
    confidence: 0.85

  # --- Loanword misspellings ---

  - incorrect: "ကွန်ပြူတာ"
    correct: "ကွန်ပျူတာ"
    meaning: "computer (medial ြ→ျ: standard loanword spelling)"
