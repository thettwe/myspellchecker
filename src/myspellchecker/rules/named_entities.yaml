# Myanmar Named Entity Gazetteer
#
# Curated list of named entities for false-positive suppression.
# Words in this gazetteer should NEVER be flagged as spelling errors.
#
# Categories:
#   person_names  - Common name prefixes and components
#   organizations - Government, media, international bodies
#   places        - States/regions, cities, international locations
#   religious     - Buddhist and religious terminology
#   historical    - Historical figures and cultural references
#
# Source: Manual curation from Myanmar NER corpora and common usage.

