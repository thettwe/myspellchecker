  input: |-
    “ကိုယ်က အနုပညာအလုပ်တွေလည်း လုပ်နေတဲ့လူ ဆေးကျောင်းက ဘွဲ့ရတဲ့အချိန်မှာတော့ ဆေးကောင်စီက ခော်ပြောတယ် အလုပ် ခုထဲက တစ်ခုပဲ လုပ်ရမယ်ဆိုပြီးတော့ ရွေးတဲ့အချိန်မှာ ညီမက ဆရာဝန်ဘက်ကို ရွေးလိုက်တော့ အဲဒီတုန်းကတည်းက ဆရာဝန်ပဲလုပ်ဖြစ်နေတာပါ။ ဆေးကျောင်းတက်ရင်း အနုပညာအလုပ်တွေ လုပ်နေရတုန်းက တစ်ချိန်ချိန်မှာ အခုလို ရွေးရမယ်ဆိုတာ သိနေခဲ့တယ်။ ဆရာဝန်အလုပ် လုပ်ဖြစ်မယ်ဆိုတာလည်း သိနေတယ်။ ဒါပေမယ့် တကယ်တမ်း ရွေးရမယ့်အချိန်မှာ တော်တော် ခက်ခဲခဲ့ပါတယ်။ စိတ်ညစ်ခဲ့ရတဲ့ အချိန်တွေလည်းရှိပါတယ်” လို့ ဆိုပါတယ်။
